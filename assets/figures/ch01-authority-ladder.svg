<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="580" viewBox="0 0 780 580" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="780" height="580" fill="#ffffff"/>
  <text x="40" y="30" font-size="16" font-weight="bold" fill="#1a1a1a">The authority ladder: each rung buys one capability and owes one control</text>
  <text x="40" y="50" font-size="12" fill="#555555">Rising the ladder adds effect authority. It does not add intelligence; software grants every rung.</text>

  <!-- Level 0 -->
  <g>
    <rect x="40" y="486" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="40" y="486" width="8" height="70" fill="#2f855a"/>
    <text x="58" y="512" font-size="14" font-weight="bold" fill="#12303f">L0 · returns text to software</text>
    <text x="58" y="530" font-size="11" fill="#444444">fails: over-trusted output</text>
    <text x="58" y="546" font-size="11" fill="#444444">held by: the calling code</text>
  </g>

  <!-- Level 1 -->
  <g>
    <rect x="110" y="408" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="110" y="408" width="8" height="70" fill="#2f855a"/>
    <text x="128" y="434" font-size="14" font-weight="bold" fill="#12303f">L1 · drafts for a person</text>
    <text x="128" y="452" font-size="11" fill="#444444">fails: fluent false claim</text>
    <text x="128" y="468" font-size="11" fill="#444444">held by: a human reviewer</text>
  </g>

  <!-- Level 2 -->
  <g>
    <rect x="180" y="330" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="180" y="330" width="8" height="70" fill="#b7791f"/>
    <text x="198" y="356" font-size="14" font-weight="bold" fill="#12303f">L2 · reads scoped systems</text>
    <text x="198" y="374" font-size="11" fill="#444444">fails: cross-tenant read</text>
    <text x="198" y="390" font-size="11" fill="#444444">held by: access control</text>
  </g>

  <!-- Level 3 -->
  <g>
    <rect x="250" y="252" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="250" y="252" width="8" height="70" fill="#b7791f"/>
    <text x="268" y="278" font-size="14" font-weight="bold" fill="#12303f">L3 · proposes an effect (approval)</text>
    <text x="268" y="296" font-size="11" fill="#444444">fails: rubber-stamped approval</text>
    <text x="268" y="312" font-size="11" fill="#444444">held by: the approval gate</text>
  </g>

  <!-- Level 4 -->
  <g>
    <rect x="320" y="174" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="320" y="174" width="8" height="70" fill="#c05621"/>
    <text x="338" y="200" font-size="14" font-weight="bold" fill="#12303f">L4 · executes a reversible effect</text>
    <text x="338" y="218" font-size="11" fill="#444444">fails: duplicated write on retry</text>
    <text x="338" y="234" font-size="11" fill="#444444">held by: idempotency + spend cap</text>
  </g>

  <!-- Level 5 -->
  <g>
    <rect x="390" y="96" width="300" height="70" rx="5" fill="#eaf1f6" stroke="#33627a" stroke-width="1.2"/>
    <rect x="390" y="96" width="8" height="70" fill="#c53030"/>
    <text x="408" y="122" font-size="14" font-weight="bold" fill="#12303f">L5 · pursues a delegated objective</text>
    <text x="408" y="140" font-size="11" fill="#444444">fails: hijacked by a hidden instruction</text>
    <text x="408" y="156" font-size="11" fill="#444444">held by: monitoring + kill switch</text>
  </g>

  <text x="40" y="574" font-size="11" fill="#777777">Higher authority = larger blast radius. A powerful model can sit at L0; a modest classifier can trigger L4 if wired to.</text>
</svg>
